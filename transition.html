<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transation</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            border: 3px solid tomato;
            background-color: aqua;
            /* transition: width 5s linear 3s,background-color 2s; */
            transition: transform 3s;
        }
        .box:hover{
            /* width: 300px; */
            transform: rotate(45deg) scale(1.6) translateX(100px);
            background-color: rgb(4, 98, 73);
        }
    </style>
</head>
<body>
    <ul>
        <li>Transform:change the shape this is css style property</li>
        <li>Translate: it is a value of the transform style rule.this means you move eihter, x or y or both</li>
        <li>Transistion:How long it will take to do the change of the shape or color</li>
    </ul>
    <div class="box">box 1</div>
    <div class="box">box 2</div>
    <div class="box">box 3</div>
    
</body>
</html>
